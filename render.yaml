databases:
  - name: arass-db
    databaseName: arass
    user: arass
    plan: free

services:
  - type: web
    name: arass-backend
    env: python
    rootDir: arass-backend
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arass-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
