<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#111827;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0c1425;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="35%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow1)"/>
  <rect width="800" height="600" fill="url(#glow2)"/>
  <!-- Grid pattern -->
  <g stroke="rgba(56,189,248,0.03)" stroke-width="0.5">
    <line x1="0" y1="0" x2="800" y2="0"/>
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="420" x2="800" y2="420"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="540" x2="800" y2="540"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="0" x2="0" y2="600"/>
    <line x1="80" y1="0" x2="80" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="560" y1="0" x2="560" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
    <line x1="720" y1="0" x2="720" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="120" fill="none" stroke="rgba(14,165,233,0.04)" stroke-width="1"/>
  <circle cx="200" cy="150" r="80" fill="none" stroke="rgba(14,165,233,0.03)" stroke-width="0.5"/>
  <circle cx="600" cy="450" r="100" fill="none" stroke="rgba(56,189,248,0.04)" stroke-width="1"/>
  <circle cx="600" cy="450" r="60" fill="none" stroke="rgba(56,189,248,0.03)" stroke-width="0.5"/>
  <!-- ARASS "A" logo watermark -->
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="180" font-weight="900" fill="rgba(14,165,233,0.025)" letter-spacing="20">A</text>
</svg>
